<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <!-- Tailwind+daisyui -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>

  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div
      class="w-full max-w-md p-5 bg-white border rounded-lg shadow-xl text-center"
    >
      <img src="./assets/github-logo.png" alt="" class="w-16 mx-auto mb-4" />
      <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
      <p class="text-gray-400 mb-1">Sign in to manage your issues</p>
      <h2 class="text-left mb-2 font-bold">Username</h2>
      <input
        id="username"
        type="text"
        placeholder="Enter Username"
        class="w-full p-2 border rounded mb-1 outline-none focus:ring-2 focus:ring-blue-400"
      />
      <h2 class="text-left mb-2 font-bold">Password</h2>
      <input
        id="password"
        type="password"
        placeholder="Enter Password"
        class="w-full p-2 border rounded mb-3 outline-none focus:ring-2 focus:ring-blue-400"
      />
      <button
        onclick="login()"
        class="w-full btn btn-primary rounded p-3 font-bold hover:bg-gray-800 transition"
      >
        Sign In
      </button>
      <!-- Demo Credentials -->
      <div class="mt-3 bg-gray-200 rounded p-2">
        <p class="text-center font-bold text-lg">OR</p>
        <h4 class="text-center mb-2 font-bold text-lg text-gray-950/50">
          Demo Credentials
        </h4>
        <p class="text-center"><strong>Username:</strong> admin</p>
        <p class="text-center"><strong>Password:</strong> admin123</p>
      </div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
